<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="shortcut icon" href="src/imgs/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="src/css/style.css">
    <title>WeatherApp</title>
</head>
<body>
    <canvas id="particulas"></canvas>
    <main id="container">
        <header class="Search__Grau">
            <form action="" id="Search__Box">
                <button type="submit" id="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
                <input type="text" name="pesquisa" id="Search" placeholder="Search city. . ." >
            </form>
            
            <div id="graus">
                <div id="celsius" class="grauAtivo">
                    ºC
                </div>
                <div id="fahrenheit">
                    ºF
                </div>
            </div>
        </header>
        <main id="dados" >
            <section id="cidade__atual">
                <div id="data__hora">
                    <div id="data__atual" class="data__atual"></div>
                    <div id="hora"></div>
                </div>
                <div id="cidade">San Francisco</div>
                <div id="pais">United States</div>
                <div id="grau__icotempo">
                    <div id="grau" class="grau">18º</div>
                    <div class="icotempo"><img src="" alt="icon" id="icon" ></div>
                </div>
                <div id="nomedoTempo" class="nomedoTempo">Partly Cloudy</div>
                <div id="outros__dados">
                    <div class="caixinha">
                        <div class="nome"><i class="fa-solid fa-wind"></i> Wind</div>
                        <div id="ventonum" class="dados"></div>
                    </div>

                    <div class="caixinha">
                        <div class="nome"><i class="fa-solid fa-temperature-half"></i> Feels like</div>
                        <div id="feeslike" class="dados"></div>
                    </div>
                    <div class="caixinha">
                        <div class="nome"><i class="fa-solid fa-droplet"></i> Humidity</div>
                        <div id="humidade" class="dados"></div>
                    </div>
                    <div class="caixinha">
                         <div class="nome"><i class="fa-solid fa-eye"></i> Visibility</div>
                        <div id="visibilidade" class="dados"></div>
                    </div>
                </div>

            </section>

            <section id="horas" class="caixa">
                    <header class="texto">Hourly Forecast</header>
                    <main id="proximasH">
                        <div class="proximasH">
                            <section class="hour_3 horas">
                                Now
                            </section>

                        <div class="proximasH">

                            </section>

                                Clear sky

                        <div class="proximasH">

                    <main class="dados_City">

                        <div class="icon_temp">
